<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Himnario Apostólico</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #1c1917;
    --muted: #57534e;
    --primary: #7f1d1d;
    --card: #ffffff;
    --border: #e7e5e4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1917;
      --fg: #f5f5f4;
      --muted: #a8a29e;
      --primary: #ef4444;
      --card: #292524;
      --border: #44403c;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 64px;
    text-align: center;
  }
  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin: 0 0 8px;
    color: var(--primary);
  }
  .tagline {
    color: var(--muted);
    font-size: 17px;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    display: block;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--fg);
    text-align: left;
    transition: border-color 0.15s ease;
  }
  .card:hover {
    border-color: var(--primary);
  }
  .card-title {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .card-desc {
    color: var(--muted);
    font-size: 14px;
  }
  footer {
    color: var(--muted);
    font-size: 13px;
    margin-top: 64px;
  }
</style>
</head>
<body>
<main>
  <h1>Himnario Apostólico</h1>
  <p class="tagline">Suprema Alabanza a Jesús — para iOS</p>

  <div class="cards">
    <a class="card" href="privacy.html">
      <div class="card-title">Política de Privacidad</div>
      <div class="card-desc">Cómo manejamos tu información</div>
    </a>
    <a class="card" href="support.html">
      <div class="card-title">Soporte</div>
      <div class="card-desc">Preguntas frecuentes y contacto</div>
    </a>
  </div>

  <footer>📧 agenwd@gmail.com</footer>
</main>
</body>
</html>
